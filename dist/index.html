  <body>
    <!-- Offline Banner -->
    <div id="offline-banner">📵 You're offline — some features may be limited</div>

    <!-- Splash Screen -->
    <div id="splash">
      <div id="splash-icon">🚗</div>
      <div id="splash-title">Car Care KE</div>
      <div id="splash-sub">by Michael (Bromine) Muchai</div>
      <div id="splash-bar"><div id="splash-progress"></div></div>
    </div>

    <!-- Install Prompt (Android Chrome) -->
    <div id="install-prompt">
      <div style="font-size: 32px">🚗</div>
      <div id="install-prompt-text">
        <div id="install-prompt-title">Install Car Care KE</div>
        <div id="install-prompt-sub">Add to home screen for quick access</div>
      </div>
      <button id="install-btn">Install</button>
      <button id="install-dismiss">✕</button>
    </div>

    <!-- React App Root -->
    <div id="root"></div>

    <!-- Main App Script (Vite/React build output) -->
    

    <script>
      // ─── SPLASH SCREEN ────────────────────────────────────────
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => splash.remove(), 400);
          }
        }, 1400);
      });

      // ─── SERVICE WORKER REGISTRATION ─────────────────────────
      if ('serviceWorker' in navigator && location.hostname !== 'www.claudeusercontent.com') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then((registration) => {
              console.log('[App] Service Worker registered:', registration.scope);

              // Check for updates every 60 minutes
              setInterval(() => registration.update(), 60 * 60 * 1000);

              // Notify user when new version available
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('[App] New version available — reload to update');
                    // Optional: show update banner
                  }
                });
              });
            })
            .catch((error) => {
              console.error('[App] Service Worker registration failed:', error);
            });
        });
      }

      // ─── OFFLINE DETECTION ───────────────────────────────────
      const offlineBanner = document.getElementById('offline-banner');
      const updateOnlineStatus = () => {
        if (!navigator.onLine) {
          offlineBanner.classList.add('visible');
        } else {
          offlineBanner.classList.remove('visible');
        }
      };
      window.addEventListener('online', updateOnlineStatus);
      window.addEventListener('offline', updateOnlineStatus);
      updateOnlineStatus();

      // ─── PWA INSTALL PROMPT ──────────────────────────────────
      let deferredPrompt;
      const installPrompt = document.getElementById('install-prompt');
      const installBtn = document.getElementById('install-btn');
      const dismissBtn = document.getElementById('install-dismiss');

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Only show if user hasn't dismissed it before
        const dismissed = localStorage.getItem('pwa-install-dismissed');
        if (!dismissed) {
          setTimeout(() => installPrompt.classList.add('visible'), 3000);
        }
      });

      installBtn.addEventListener('click', async () => {
        installPrompt.classList.remove('visible');
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log('[App] Install outcome:', outcome);
          deferredPrompt = null;
        }
      });

      dismissBtn.addEventListener('click', () => {
        installPrompt.classList.remove('visible');
        localStorage.setItem('pwa-install-dismissed', 'true');
      });

      window.addEventListener('appinstalled', () => {
        console.log('[App] Car Care KE was installed!');
        installPrompt.classList.remove('visible');
      });
    </script>
